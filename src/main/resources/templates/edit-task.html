<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Task</title>
</head>
<body>

<h1>Edit Task</h1>

<form th:action="@{/tasks/save}" th:object="${task}" method="post">
    <input type="hidden" th:field="*{taskId}" />

    Title: <input type="text" th:field="*{title}" /><br>
    Description: <input type="text" th:field="*{description}" /><br>
    Due Date: <input type="date" th:field="*{dueDate}" /><br>
    Status:
    <select th:field="*{status}">
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
        <option value="Overdue">Overdue</option>
    </select><br>

    <button type="submit">Update Task</button>
</form>

</body>
</html>
