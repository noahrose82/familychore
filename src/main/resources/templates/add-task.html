<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Task</title>
<link rel="stylesheet" href="/css/style.css"></head>
<body>

<div class="navbar">
    <div class="brand">FamilyChore</div>
    <div class="nav-links">
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/tasks}">Tasks</a>
    </div>
</div>

<div class="container">
    <div class="card form-card">
        <h1 class="page-title">Add Task</h1>

        <form action="/tasks/save" method="post">
            <div class="form-group">
                <label for="title">Title</label>
                <input id="title" type="text" name="title" placeholder="Enter task title" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <input id="description" type="text" name="description" placeholder="Enter task description" required>
            </div>

            <div class="form-group">
                <label for="dueDate">Due Date</label>
                <input id="dueDate" type="date" name="dueDate" required>
            </div>

            <div class="form-actions">
                <button class="btn" type="submit">Save Task</button>
                <a class="btn btn-secondary" href="/tasks">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div class="footer">
    FamilyChore ✨ Cloud Application
</div>

</body>
</html>
