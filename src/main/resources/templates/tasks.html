<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task List</title>
<link rel="stylesheet" href="/css/style.css"></head>
<body>

<div class="navbar">
    <div class="brand">FamilyChore</div>
    <div class="nav-links">
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/tasks}">Tasks</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <h1 class="page-title">Task List</h1>

        <div class="page-actions">
            <a class="btn" th:href="@{/tasks/add}">Add Task</a>
            <a class="btn btn-secondary" th:href="@{/}">Back to Dashboard</a>
        </div>

        <div class="table-wrapper" th:if="${tasks != null and !#lists.isEmpty(tasks)}">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Due Date</th>
                        <th>Status</th>
                        <th style="width: 180px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="task : ${tasks}">
                        <td th:text="${task.title}"></td>
                        <td th:text="${task.description}"></td>
                        <td th:text="${task.dueDate}"></td>
                        <td th:text="${task.status}"></td>
                        <td>
                            <div class="actions">
                                <a class="btn btn-secondary" th:href="@{/tasks/edit/{id}(id=${task.taskId})}">Edit</a>
                                <a class="btn btn-danger" th:href="@{/tasks/delete/{id}(id=${task.taskId})}">Delete</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="empty-state" th:if="${tasks == null or #lists.isEmpty(tasks)}">
            No tasks have been added yet. Click <strong>Add Task</strong> to create your first chore.
        </div>
    </div>
</div>

<div class="footer">
    FamilyChore ✨ Cloud Application
</div>

</body>
</html>
