<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tasks</title>
</head>
<body>

<h1>Task List</h1>

<a href="/tasks/add">Add Task</a>
<br><br>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>

    <tr th:each="task : ${tasks}">
        <td th:text="${task.title}"></td>
        <td th:text="${task.description}"></td>
        <td th:text="${task.dueDate}"></td>
        <td th:text="${task.status}"></td>
        <td><a th:href="@{/tasks/edit/{id}(id=${task.taskId})}">Edit</a></td>
        <td><a th:href="@{/tasks/delete/{id}(id=${task.taskId})}">Delete</a></td>
    </tr>
</table>

</body>
</html>
